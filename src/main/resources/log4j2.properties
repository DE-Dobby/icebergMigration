rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1} - %m%n

# Migration 패키지 로그 레벨
logger.migration.name = com.migration
logger.migration.level = INFO

# Spark/Iceberg 노이즈 감소
logger.spark.name = org.apache.spark
logger.spark.level = WARN
logger.iceberg.name = org.apache.iceberg
logger.iceberg.level = INFO
